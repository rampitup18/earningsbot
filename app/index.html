<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EarningsBot</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <div class="header">
    <div>
      <h1>EarningsBot</h1>
      <div class="subtitle" id="subtitle">Pre-earnings trade scanner</div>
    </div>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>

  <div id="content"></div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <h2>Settings</h2>
      <label for="settings-input">ntfy Topic</label>
      <input id="settings-input" type="text" placeholder="earningsbot-yourprivatetopic" autocapitalize="none" autocorrect="off">
      <div class="hint">The topic name you subscribed to in the ntfy app</div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
